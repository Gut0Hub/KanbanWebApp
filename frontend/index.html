<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Gerenciador de Tarefas</h1>

<div class="form">
  <input id="titulo" placeholder="Título">
  <input id="descricao" placeholder="Descrição">
  <button onclick="criarTarefa()">Criar</button>
</div>

<div class="kanban">
  <div class="coluna">
    <h2>Pendente</h2>
    <div id="pendente"></div>
  </div>

  <div class="coluna">
    <h2>Em andamento</h2>
    <div id="andamento"></div>
  </div>

  <div class="coluna">
    <h2>Finalizado</h2>
    <div id="finalizado"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
